name: AI Act Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python scripts/monitor.py

      - name: Upload state
        uses: actions/upload-artifact@v4
        with:
          name: monitor-state
          path: latest.json
      - name: Debug files
        run: |
          ls -al
          cat latest.json || true
